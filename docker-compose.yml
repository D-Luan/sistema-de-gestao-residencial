version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: postgres_sgr
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_NAME: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sgr_network

volumes:
  postgres_data:

networks:
  sgr_network:   