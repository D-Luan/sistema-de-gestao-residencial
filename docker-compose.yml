version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: postgres_sgr
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sgr_network

volumes:
  postgres_data:

networks:
  sgr_network:   